<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="APMatheus.ico" type="image/x-icon">
    <title>Pseudo-Classes</title>
    <style>
        div{
            background-color: aquamarine;
            width: 200px;
            height: 200px;
            text-align: center;
            border: 2px solid black;
            display: inline-block;
        }

        div#caixa01:hover{
            background-color: orangered;
        }
        div#caixa02:hover{
            background-color: yellow;
        }
        div#caixa03:hover{
            background-color: red;
        }
    
    </style>
</head>
<body>
    <div id="caixa01">01</div>
    <div id="caixa02">02</div>
    <div id="caixa03">03</div>
</body>
</html>
