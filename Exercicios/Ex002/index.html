<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de paragrafos</title>
</head>
<body>
    <h1>Paragrafos e quebras de linhas</h1>
    <hr>
    <p>Aqui você pode escrever
        um paragrafo de 
        qualquer jeito.
        Basta escrever entre 
        as tags &lt;p&gt; e &lt;/p&gt;.
    </p>
    <p>para fazer uma quebra
        de texto <br> como essa,
        basta adicionar a tag &lt;br&gt;.
    </p>
    <p>
        vamos adicionar alguns caracteres especiais:
        &copy;
        &trade;
        &euro;
        &cent;
    </p>
    <p>
        vamos adicionar alguns emojis:
        &#x1F60E;
        &#X1f4d6;
        &#x1f3c3;
    </p>
</body>
</html>
