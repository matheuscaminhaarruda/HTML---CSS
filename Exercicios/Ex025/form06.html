<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="APMatheus.ico" type="image/x-icon">
    <title>Formulários</title>
</head>
<body>
    <h1>Exemplo de Formulários</h1>
    <form action="cadastro.php" method="post">

        <p>
            <label for="icor">Cor:</label>
            <input type="color" name="cor" id="icor" value="#99ff11">
        </p>

        <p>
            <label for="inivel">Nivel:</label>
            <input type="range" name="nivel" id="inivel" min="0" max="10">
        </p>

        <p>
            <label for="ifoto">Arquivo:</label>
            <input type="file" name="foto" id="ifoto">
        </p>

         <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
