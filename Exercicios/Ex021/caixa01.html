<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="APMatheus.ico" type="image/x-icon">
    <title>Exemplos de Caixa</title>
    <style>
        h1{
            background-color: lightgray;
            height: 200px;
            width: 200px;

            border: 10px solid darkgray;

            padding: 10px 35px;

            margin: 50px 0px 50px 100px;

            outline: 5px dashed yellowgreen;
        }

        a{
             border-width: 5px;
            border-style: dashed;
            border-color: rgb(235, 128, 226);

            padding:5px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Box-Level</h1>
    <p>o parágrafo também é um exemplo de box-level, mas o <a href="#">link é um inline-level</a>. Vamos fazer uns testes.</p>
</body>
</html>
