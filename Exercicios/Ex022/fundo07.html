<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/APMatheus.ico" type="image/x-icon">
    <title>Alinhamento de Caixa</title>
    <style>
        #conteiner{
            position: relative;
            height: 93vh;
            padding: 10px;

            background-size: 100% 100%;
            background-color: purple;
            background-image: url(imagens/target001.png);
            
        }

        #conteudo{
            position: absolute;

            left: 50%;
            top: 50%;
            transform: translate(-50% , -50%);

            background-size: 100% 100%;
            background-color: yellow;
            background-image: url(imagens/target001.png);

            height: 200px;
            width: 300px;
            
        }
    </style>
</head>
<body>
    <main>
        <section id="conteiner">
            <article id="conteudo">

            </article>
        </section>
    </main>
</body>
</html>
