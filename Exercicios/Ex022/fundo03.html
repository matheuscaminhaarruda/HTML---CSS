<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/APMatheus.ico" type="image/x-icon">
    <title>Posicionamento</title>
    <style>
        div.exemplo{
            border-radius: 10px;
            border: 1px solid black;
            height: 100px;
            width: 600px;
            margin: 10px;
            background-image: url(imagens/wallpaper003.jpg);
        }

        div#q1{
            background-position: left top;
        }

        div#q2{
            background-position: left center;
        }

        div#q3{
            background-position: left bottom;
        }

        div#q4{
            background-position: right bottom;
        }
    </style>
</head>
<body>
    <div class="exemplo" id="q1">

    </div>
    <div class="exemplo" id="q2">

    </div>
    <div class="exemplo" id="q3">

    </div>
    <div class="exemplo" id="q4">

    </div>
</body>
</html>
