<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="APMatheus.ico" type="image/x-icon">
    <title>Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            width: 400px;
            height: 400px;
            border: 3px solid red;
            border-collapse: collapse;
        }

        .linha{
            background-color: yellow;
            
        }

        td{
            border: 1px solid black;
            padding: 5px;
            vertical-align: middle;
            text-align: center;
        }

        #dado{
            background-color: blue;
            text-align: right;
            vertical-align: bottom;
        }
    </style>
</head>
<body>
    <h1>Construindo tabelas em HTML</h1>
    <table>
        <tr>
            <td>A1</td>
            <td>B1</td>
            <td id="dado">C1</td>
        </tr>
        <tr class="linha">
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>
        <tr>
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>
        <tr class="linha">
            <td>A4</td>
            <td>B4</td>
            <td>C4</td>
        </tr>
    </table>
</body>
</html>
