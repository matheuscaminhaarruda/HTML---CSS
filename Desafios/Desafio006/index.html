<body>
    <h1>Tags em HTML</h1>
    <hr>
    <p>Em <strong>HTML</strong>, podemos inserir os elemtnso da lista a seguir. <ins>Passe o mouse</ins> sobre os termos para descobrir qual tag deverá útilizar em cada caso.</p>
    <ul>
        <li>
            <abbr title="Use a tag &lt;p&gt;">Parágrafo</abbr>
        </li>
        <li>
            <abbr title="Use a tag &lt;h1&gt até o &lt;h6&gt;;">Títulos</abbr>
        </li>
        <li>
            <abbr title="Use a tag &lt;img&gt;">Imagens</abbr>
        </li>
        <li>
            <abbr title="Use a tag &lt;abbr&gt;">Abreviações</abbr>
        </li>
        <li>
            <abbr title="Use a tag &lt;code&gt;">Código-fonte</abbr>
        </li>
        <li>
            <abbr title="Use a tag &lt;ol&gt;">Listas numeradas</abbr>
        </li>
        <li>
            <abbr title="Use a tag &lt;dl&gt;">Lista com definições</abbr>
        </li>
    </ul>
